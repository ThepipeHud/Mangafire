<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Catálogo de mangas — MangaFire">
    <title>MangaFire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-container" aria-label="Principal">
            <a href="#" class="nav-logo-link">
                <h1 class="nav-title">MangaFire</h1>
            </a>
            <ul class="nav-list">
                <li><a href="#" class="nav-link">Mangas</a></li>
                <li><a href="#" class="nav-link">Popular</a></li>
                <li><a href="#" class="nav-link">Latest</a></li>
            </ul>
            <form class="search-form" role="search">
                <label for="manga-search">Search manga</label>
                <input type="search" id="manga-search" placeholder="Search manga..." autocomplete="off">
            </form>
            <div class="profile-menu">
                <button class="profile-button" type="button" aria-label="Open profile login" aria-expanded="false" aria-controls="login-panel">
                    <svg class="profile-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4Z"></path>
                        <path d="M4.5 21c.9-4.1 3.8-6.4 7.5-6.4s6.6 2.3 7.5 6.4"></path>
                    </svg>
                </button>
                <div class="login-panel" id="login-panel" hidden>
                    <div class="auth-tabs" role="tablist" aria-label="Account options">
                        <button class="auth-tab active" type="button" data-auth-tab="sign-in">Sign In</button>
                        <button class="auth-tab" type="button" data-auth-tab="register">Register</button>
                    </div>
                    <form class="auth-form active" data-auth-form="sign-in" aria-label="Sign in form">
                        <h2>Sign In</h2>
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email" required>
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="submit" class="auth-submit">Log In</button>
                        <a href="#" class="auth-link">Favorites</a>
                    </form>
                    <form class="auth-form" data-auth-form="register" aria-label="Register form">
                        <h2>Register</h2>
                        <label for="register-name">Username</label>
                        <input type="text" id="register-name" name="username" placeholder="Username" autocomplete="username" required>
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" name="email" placeholder="you@example.com" autocomplete="email" required>
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" name="password" placeholder="Create a password" autocomplete="new-password" required>
                        <button type="submit" class="auth-submit">Create Account</button>
                        <a href="#" class="auth-link">Favorites</a>
                    </form>
                </div>
            </div>
       </nav>
    </header>
    <main class="page-main">
        <section class="content-layout" aria-label="Contenido principal">
            <section class="manga-panel" aria-label="Manga list">
                <div class="manga-grid">
                    <a href="#" class="manga-card" aria-label="Ver Naruto" data-title="Naruto">
                        <img src="imagenes/naruto/naruto_9.jpg" alt="Naruto">
                        <span>Naruto</span>
                    </a>
                    <a href="#" class="manga-card" aria-label="Ver Bleach" data-title="Bleach">
                        <img src="imagenes/bleach/bleach_4.jpg" alt="Bleach">
                        <span>Bleach</span>
                    </a>
                </div>
            </section>
            <aside class="news-panel" aria-label="Side content"></aside>
        </section>
    </main>
    <footer class="site-footer" role="contentinfo">
        <div class="footer-content">
            <p>Support the site via PayPal: <a href="https://paypal.me/ThepipeHud">paypal.me/ThepipeHud</a></p>
            <nav class="footer-links" aria-label="Footer">
                <a href="#">Contact</a>
                <a href="#">About</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </nav>
            <p class="copyright">&copy; 2026 MangaFire</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
